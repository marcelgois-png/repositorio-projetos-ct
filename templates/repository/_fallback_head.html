<style>

    background: transparent;

    display: inline-flex;
    height: 28px;
    justify-content: center;
    padding: 0;
    width: 28px;
  }

    line-height: 1;

  .text-end {

  }

  }

  }

  .btn-outline-secondary:hover,
  .btn-outline-primary:hover {
