{% extends "base.html" %}

{% block title %}{{ title }} | Repositório CT/UFPB{% endblock %}

{% block content %}
<section class="page-header compact">
  <div>
    <p class="eyebrow">Equipe do projeto</p>
    <h1>{{ title }}</h1>
  </div>
  <a class="btn btn-outline-secondary" href="{{ project.get_absolute_url }}#team"><i class="bi bi-arrow-left"></i> Voltar à equipe</a>
</section>

<form method="post" class="form-panel">
  {% csrf_token %}
  {% include "repository/_form_fields.html" %}
  <div class="form-actions">
    <button class="btn btn-primary" type="submit"><i class="bi bi-person-plus"></i> Salvar membro</button>
  </div>
</form>
{% endblock %}
